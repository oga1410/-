<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로스트아크 편린 기록</title>
  <style>
    :root {
      --bg: #09090b;
      --card: #18181b;
      --muted: #27272a;
      --line: #3f3f46;
      --text: #fafafa;
      --sub: #a1a1aa;
      --yellow: #fde047;
      --violet: #c4b5fd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard","Noto Sans KR",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .stack { display: grid; gap: 24px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 24px;
    }
    .title { font-size: 32px; font-weight: 800; margin: 0; }
    .subtitle { margin: 8px 0 0; color: var(--sub); line-height: 1.6; }
    .card-title { font-size: 28px; font-weight: 800; margin: 0 0 16px; }
    .stat {
      background: var(--muted);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
    }
    .stat-label { font-size: 14px; color: var(--sub); }
    .stat-value { font-size: 28px; font-weight: 700; margin-top: 6px; }
    .yellow { color: var(--yellow); }
    .violet { color: var(--violet); }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .input, .select, .textarea {
      width: 100%;
      background: var(--muted);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      outline: none;
      font: inherit;
    }
    .textarea { min-height: 100px; resize: vertical; }
    .label {
      color: var(--sub);
      font-size: 14px;
      margin-bottom: 8px;
    }
    .recent-row, .btn-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip {
      border: 1px solid var(--line);
      background: var(--muted);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      font: inherit;
    }
    .chip:hover { background: #3f3f46; }
    .drop-box {
      border: 1px solid var(--line);
      background: rgba(39,39,42,.7);
      border-radius: 20px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .hint-box {
      border: 1px dashed var(--line);
      background: rgba(39,39,42,.3);
      border-radius: 20px;
      padding: 16px;
      color: var(--sub);
      line-height: 1.6;
      font-size: 14px;
    }
    .record-list { display: grid; gap: 12px; }
    .record-item {
      border: 1px solid var(--line);
      background: var(--muted);
      border-radius: 20px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .record-title { font-weight: 700; }
    .record-meta { color: #d4d4d8; font-size: 14px; margin-top: 4px; line-height: 1.55; }
    .record-memo { color: var(--sub); font-size: 14px; margin-top: 4px; line-height: 1.55; }
    .del {
      border: none;
      background: transparent;
      color: var(--sub);
      cursor: pointer;
      font-size: 24px;
      line-height: 1;
    }
    .del:hover { color: white; }
    .big-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: none;
      border-radius: 20px;
      padding: 18px 28px;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
    }
    .btn-drop {
      background: #facc15;
      color: #111827;
    }
    .btn-miss {
      background: #3f3f46;
      color: white;
    }
    .btn-soft {
      border: 1px solid var(--line);
      background: var(--muted);
      color: white;
      border-radius: 18px;
      padding: 12px 16px;
      cursor: pointer;
      font: inherit;
    }
    .btn-soft:hover { background: #3f3f46; }
    .btn-ghost {
      border: none;
      background: transparent;
      color: #d4d4d8;
      cursor: pointer;
      font: inherit;
      padding: 8px 10px;
      border-radius: 14px;
    }
    .btn-ghost:hover { background: #3f3f46; color: white; }
    .btn-ghost:disabled { opacity: .4; cursor: default; }
    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      object-fit: contain;
      background: rgba(255,255,255,.08);
    }
    .section-stack { display: grid; gap: 24px; }
    .empty { color: var(--sub); }
    @media (max-width: 980px) {
      .grid-2, .grid-5, .form-grid-2 { grid-template-columns: 1fr; }
      .wrap { padding: 16px; }
      .title { font-size: 28px; }
      .card-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stack">
      <section class="card">
        <h1 class="title">편린 기록</h1>
        <p class="subtitle">입장 횟수, 편린 획득, 월별 요약, 캐릭터별 요약, 입장당 평균 드랍 횟수를 함께 기록하는 사이트입니다.</p>
      </section>

      <section class="card">
        <div class="grid-5">
          <div class="stat">
            <div class="stat-label">운명의 편린</div>
            <div class="stat-value yellow" id="stat-fate">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">축복의 편린</div>
            <div class="stat-value violet" id="stat-blessing">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">쿠르잔 입장</div>
            <div class="stat-value" id="stat-kurzan">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">가디언 입장</div>
            <div class="stat-value" id="stat-guardian">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">누적 골드</div>
            <div class="stat-value" id="stat-gold">0</div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2 class="card-title">기록 입력</h2>

        <div class="stack" style="gap: 16px;">
          <div class="form-grid-2">
            <input id="date" class="input" type="date" />
            <input id="character" class="input" type="text" placeholder="캐릭터 닉네임 입력" />
          </div>

          <div id="recent-wrap" style="display:none;">
            <div class="label">최근 입력한 닉네임</div>
            <div class="recent-row" id="recent-characters"></div>
          </div>

          <div class="form-grid-2">
            <select id="contentType" class="select">
              <option value="쿠르잔 전선">쿠르잔 전선</option>
              <option value="가디언 토벌">가디언 토벌</option>
            </select>
            <input id="entryCount" class="input" type="number" min="1" value="1" placeholder="입장 횟수" />
          </div>

          <div class="stack" style="gap: 12px;">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
              <div class="label" style="margin:0;">드랍 목록</div>
              <button type="button" class="btn-soft" id="add-drop-btn">드랍 추가</button>
            </div>
            <div id="drops-container" class="section-stack"></div>
          </div>

          <textarea id="memo" class="textarea" placeholder="메모"></textarea>

          <div class="btn-row">
            <button type="button" class="big-btn btn-drop" id="save-with-drops">

        <div class="section-stack">
          <section class="card">
            <h2 class="card-title">월별 요약</h2>

          </section>

          <section class="card">
            <h2 class="card-title">캐릭터별 요약</h2>
            <div id="character-list" class="record-list"></div>
          </section>

          <section class="card">
            <h2 class="card-title">입장당 평균 드랍 횟수</h2>
            <div class="record-list" id="avg-list"></div>
          </section>
        </div>

        <div class="section-stack">
          <section class="card">
            <h2 class="card-title">최근 입장 기록</h2>
            <div id="entries-list" class="record-list"></div>
          </section>

          <section class="card">
            <h2 class="card-title">최근 편린 기록</h2>
            <div id="records-list" class="record-list"></div>
          </section>
        </div>

  <script>
    const STORAGE_KEY = "lostark-shard-record-site-html-v1";

    const FATE_REWARDS = [
      "유각(랜덤)", "유각(선택)",
      "10,000골드", "20,000골드", "50,000골드", "100,000골드", "200,000골드", "300,000골드",
      "500,000실링", "1,000,000실링", "2,000,000실링", "5,000,000실링", "10,000,000실링",
      "잼(소)", "잼(중)", "잼(대)",
      "재련재료(소)", "재련재료(중)", "재련재료(대)",
      "전카(랜덤)", "전카(선택)", "영선",
      "카경(프리미엄)", "카경(실버)", "카경(럭키)", "카경(일반)",
      "기타",
    ];

    const BLESSING_REWARDS = [
      "유각(랜덤)", "유각(선택)",
      "10,000골드", "20,000골드", "50,000골드", "100,000골드", "200,000골드",
      "전카(직각 I)", "전카(직각 II)", "전카(기백)", "전카(기백 II)", "전카(영웅)", "전카(도약)",
      "기타",
    ];

    const rewardGoldMap = {
      "10,000골드": 10000,
      "20,000골드": 20000,
      "50,000골드": 50000,
      "100,000골드": 100000,
      "200,000골드": 200000,
      "300,000골드": 300000,
    };

    const state = {
      entries: [],
      records: [],
      drops: [makeDefaultDrop()],
    };

    function makeDefaultDrop() {
      return { shardType: "운명의 편린", reward: FATE_REWARDS[0], count: "1" };
    }

    function getKoreanDateString() {
      return new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Seoul",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).format(new Date());
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        entries: state.entries,
        records: state.records
      }));
    }

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        const parsed = JSON.parse(saved);
        state.entries = Array.isArray(parsed.entries) ? parsed.entries : [];
        state.records = Array.isArray(parsed.records) ? parsed.records : [];
      } catch (e) {
        console.error(e);
      }
    }

    const els = {
      date: document.getElementById("date"),
      character: document.getElementById("character"),
      contentType: document.getElementById("contentType"),
      entryCount: document.getElementById("entryCount"),
      memo: document.getElementById("memo"),
      addDropBtn: document.getElementById("add-drop-btn"),
      saveWithDrops: document.getElementById("save-with-drops"),
      saveEntryOnly: document.getElementById("save-entry-only"),
      dropsContainer: document.getElementById("drops-container"),
      recentWrap: document.getElementById("recent-wrap"),
      recentCharacters: document.getElementById("recent-characters"),
      statFate: document.getElementById("stat-fate"),
      statBlessing: document.getElementById("stat-blessing"),
      statKurzan: document.getElementById("stat-kurzan"),
      statGuardian: document.getElementById("stat-guardian"),
      statGold: document.getElementById("stat-gold"),
      monthlyList: document.getElementById("monthly-list"),
      characterList: document.getElementById("character-list"),
      avgList: document.getElementById("avg-list"),
      entriesList: document.getElementById("entries-list"),
      recordsList: document.getElementById("records-list"),
    };

    function renderDrops() {
      if (!state.drops.length) {
        els.dropsContainer.innerHTML = `
          <div class="hint-box">
            드랍 목록이 비어 있습니다. 이 상태로는 <span style="color:white;">입장만 저장</span>해서 편린을 못 먹은 판을 기록할 수 있습니다.
          </div>
        `;
        return;
      }

      els.dropsContainer.innerHTML = state.drops.map((drop, index) => {
        const rewardOptions = (drop.shardType === "운명의 편린" ? FATE_REWARDS : BLESSING_REWARDS)
          .map(r => `<option value="${escapeAttr(r)}" ${drop.reward === r ? "selected" : ""}>${escapeHtml(r)}</option>`)
          .join("");

        return `
          <div class="drop-box">
            <div class="form-grid-2" style="grid-template-columns: 1fr 1fr 1fr;">
              <select class="select drop-shard" data-index="${index}">
                <option value="운명의 편린" ${drop.shardType === "운명의 편린" ? "selected" : ""}>운명의 편린</option>
                <option value="축복의 편린" ${drop.shardType === "축복의 편린" ? "selected" : ""}>축복의 편린</option>
              </select>
              <select class="select drop-reward" data-index="${index}">
                ${rewardOptions}
              </select>
              <input class="input drop-count" data-index="${index}" type="number" min="1" value="${escapeAttr(drop.count)}" placeholder="개수" />
            </div>
            <div style="display:flex; justify-content:flex-end;">
              <button type="button" class="btn-ghost drop-remove" data-index="${index}">이 줄 삭제</button>
            </div>
          </div>
        `;
      }).join("");

      els.dropsContainer.querySelectorAll(".drop-shard").forEach(el => {
        el.addEventListener("change", e => {
          const index = Number(e.target.dataset.index);
          const shardType = e.target.value;
          state.drops[index].shardType = shardType;
          state.drops[index].reward = shardType === "운명의 편린" ? FATE_REWARDS[0] : BLESSING_REWARDS[0];
          renderDrops();
        });
      });

      els.dropsContainer.querySelectorAll(".drop-reward").forEach(el => {
        el.addEventListener("change", e => {
          const index = Number(e.target.dataset.index);
          state.drops[index].reward = e.target.value;
        });
      });

      els.dropsContainer.querySelectorAll(".drop-count").forEach(el => {
        el.addEventListener("input", e => {
          const index = Number(e.target.dataset.index);
          state.drops[index].count = e.target.value;
        });
      });

      els.dropsContainer.querySelectorAll(".drop-remove").forEach(el => {
        el.addEventListener("click", e => {
          const index = Number(e.target.dataset.index);
          state.drops = state.drops.length === 1 ? [] : state.drops.filter((_, i) => i !== index);
          renderDrops();
        });
      });
    }

    function recentCharacterNames() {
      const seen = new Set();
      return [...state.records, ...state.entries]
        .map(v => (v.character || "").trim())
        .filter(Boolean)
        .filter(name => {
          if (seen.has(name)) return false;
          seen.add(name);
          return true;
        })
        .slice(0, 8);
    }

    function renderRecentCharacters() {
      const list = recentCharacterNames();
      if (!list.length) {
        els.recentWrap.style.display = "none";
        els.recentCharacters.innerHTML = "";
        return;
      }
      els.recentWrap.style.display = "block";
      els.recentCharacters.innerHTML = list.map(name => `
        <button type="button" class="chip" data-name="${escapeAttr(name)}">${escapeHtml(name)}</button>
      `).join("");
      els.recentCharacters.querySelectorAll("[data-name]").forEach(btn => {
        btn.addEventListener("click", () => {
          els.character.value = btn.dataset.name;
        });
      });
    }

    function renderStats() {
      const fate = state.records.filter(r => r.shardType === "운명의 편린").length;
      const blessing = state.records.filter(r => r.shardType === "축복의 편린").length;
      const kurzan = state.entries.filter(e => e.contentType === "쿠르잔 전선").reduce((s, e) => s + Number(e.entryCount || 0), 0);
      const guardian = state.entries.filter(e => e.contentType === "가디언 토벌").reduce((s, e) => s + Number(e.entryCount || 0), 0);
      const gold = state.records.reduce((s, r) => s + Number(r.gold || 0), 0);

      els.statFate.textContent = fate.toLocaleString();
      els.statBlessing.textContent = blessing.toLocaleString();
      els.statKurzan.textContent = kurzan.toLocaleString();
      els.statGuardian.textContent = guardian.toLocaleString();
      els.statGold.textContent = gold.toLocaleString();
    }

    function renderMonthlySummary() {
      if (!state.records.length) {
        els.monthlyList.innerHTML = `<div class="empty">아직 기록이 없습니다.</div>`;
        return;
      }
      const map = {};
      state.records.forEach(r => {
        const month = r.date.slice(0, 7);
        if (!map[month]) map[month] = { fate: 0, blessing: 0 };
        if (r.shardType === "운명의 편린") map[month].fate += 1;
        else map[month].blessing += 1;
      });
      els.monthlyList.innerHTML = Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0])).map(([month, value]) => `
        <div class="record-item">
          <div>
            <div class="record-title">${escapeHtml(month)}</div>
            <div class="record-meta">→ <span class="yellow">운명 ${value.fate}개</span> / <span class="violet">축복 ${value.blessing}개</span></div>
          </div>
        </div>
      `).join("");
    }

    function renderCharacterSummary() {
      const map = {};
      state.records.forEach(r => {
        const name = (r.character || "").trim();
        if (!name) return;
        if (!map[name]) map[name] = { fate: 0, blessing: 0, gold: 0 };
        if (r.shardType === "운명의 편린") map[name].fate += 1;
        else map[name].blessing += 1;
        map[name].gold += Number(r.gold || 0);
      });
      const entries = Object.entries(map).sort((a,b)=>(b[1].fate+b[1].blessing)-(a[1].fate+a[1].blessing));
      els.characterList.innerHTML = entries.length ? entries.map(([name, value]) => `
        <div class="record-item">
          <div>
            <div class="record-title">${escapeHtml(name)}</div>
            <div class="record-meta"><span class="yellow">운명 ${value.fate}개</span> / <span class="violet">축복 ${value.blessing}개</span> / 골드 ${value.gold.toLocaleString()}</div>
          </div>
        </div>
      `).join("") : `<div class="empty">아직 기록이 없습니다.</div>`;
    }

    function avgPerEntry(drops, entries) {
      if (!entries) return "-";
      return (drops / entries).toFixed(2) + "개/판";
    }

    function renderAverageSummary() {
      const kurzanEntries = state.entries.filter(e => e.contentType === "쿠르잔 전선").reduce((s,e)=>s+Number(e.entryCount||0),0);
      const guardianEntries = state.entries.filter(e => e.contentType === "가디언 토벌").reduce((s,e)=>s+Number(e.entryCount||0),0);

      const kurzanFate = state.records.filter(r => r.contentType === "쿠르잔 전선" && r.shardType === "운명의 편린").length;
      const kurzanBlessing = state.records.filter(r => r.contentType === "쿠르잔 전선" && r.shardType === "축복의 편린").length;
      const guardianFate = state.records.filter(r => r.contentType === "가디언 토벌" && r.shardType === "운명의 편린").length;
      const guardianBlessing = state.records.filter(r => r.contentType === "가디언 토벌" && r.shardType === "축복의 편린").length;

      els.avgList.innerHTML = `
        <div class="record-item">
          <div>
            <div class="record-title">쿠르잔 전선</div>
            <div class="record-meta">입장 ${kurzanEntries}회</div>
            <div class="record-meta"><span class="yellow">운명 ${kurzanFate}개</span> / 평균 ${avgPerEntry(kurzanFate, kurzanEntries)}</div>
            <div class="record-meta"><span class="violet">축복 ${kurzanBlessing}개</span> / 평균 ${avgPerEntry(kurzanBlessing, kurzanEntries)}</div>
          </div>
        </div>
        <div class="record-item">
          <div>
            <div class="record-title">가디언 토벌</div>
            <div class="record-meta">입장 ${guardianEntries}회</div>
            <div class="record-meta"><span class="yellow">운명 ${guardianFate}개</span> / 평균 ${avgPerEntry(guardianFate, guardianEntries)}</div>
            <div class="record-meta"><span class="violet">축복 ${guardianBlessing}개</span> / 평균 ${avgPerEntry(guardianBlessing, guardianEntries)}</div>
          </div>
        </div>
      `;
    }

    function renderEntries() {
      els.entriesList.innerHTML = state.entries.length ? state.entries.slice(0, 12).map(entry => `
        <div class="record-item">
          <div>
            <div class="record-title">${escapeHtml(entry.character)} · ${escapeHtml(entry.contentType)}</div>
            <div class="record-meta">${escapeHtml(entry.date)} / 입장 ${Number(entry.entryCount || 0)}회</div>
            ${entry.memo ? `<div class="record-memo">${escapeHtml(entry.memo)}</div>` : ""}
          </div>
          <button class="del" type="button" data-entry-id="${entry.id}">×</button>
        </div>
      `).join("") : `<div class="empty">아직 기록이 없습니다.</div>`;

      els.entriesList.querySelectorAll("[data-entry-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.entries = state.entries.filter(e => e.id !== btn.dataset.entryId);
          saveState();
          renderAll();
        });
      });
    }

    function renderRecords() {
      els.recordsList.innerHTML = state.records.length ? state.records.slice(0, 12).map(record => `
        <div class="record-item">
          <div>
            <div class="record-title">${escapeHtml(record.character)} · ${escapeHtml(record.contentType)} · ${escapeHtml(record.shardType)}</div>
            <div class="record-meta">
              ${escapeHtml(record.date)} / ${escapeHtml(record.reward)}${record.gold && !record.reward.includes("골드") ? ` / ${Number(record.gold).toLocaleString()}골드` : ""}
            </div>
            ${record.memo ? `<div class="record-memo">${escapeHtml(record.memo)}</div>` : ""}
          </div>
          <button class="del" type="button" data-record-id="${record.id}">×</button>
        </div>
      `).join("") : `<div class="empty">아직 기록이 없습니다.</div>`;

      els.recordsList.querySelectorAll("[data-record-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.records = state.records.filter(r => r.id !== btn.dataset.recordId);
          saveState();
          renderAll();
        });
      });
    }

    function renderAll() {
      renderDrops();
      renderRecentCharacters();
      renderStats();
      renderMonthlySummary();
      renderCharacterSummary();
      renderAverageSummary();
      renderEntries();
      renderRecords();
    }

    function saveEntry(withDrops) {
      const character = els.character.value.trim();
      if (!character) {
        alert("캐릭터 닉네임을 입력해 주세요.");
        return;
      }

      const entryCount = Number(els.entryCount.value || 0);
      if (!entryCount || entryCount < 1) {
        alert("입장 횟수를 1 이상 입력해 주세요.");
        return;
      }

      const createdAt = new Date().toISOString();
      const entry = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2),
        date: els.date.value || getKoreanDateString(),
        character,
        contentType: els.contentType.value,
        entryCount,
        memo: withDrops ? els.memo.value.trim() : ((els.memo.value.trim() ? els.memo.value.trim() + " / " : "") + "편린 미획득"),
        createdAt,
      };

      let newRecords = [];
      if (withDrops) {
        const normalizedDrops = state.drops
          .map(drop => ({ ...drop, count: Number(drop.count || 0) }))
          .filter(drop => drop.count >= 1);

        if (!normalizedDrops.length) {
          alert("드랍 목록을 입력해 주세요.");
          return;
        }

        newRecords = normalizedDrops.flatMap(drop =>
          Array.from({ length: drop.count }).map(() => ({
            id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2),
            date: els.date.value || getKoreanDateString(),
            character,
            contentType: els.contentType.value,
            shardType: drop.shardType,
            reward: drop.reward,
            memo: els.memo.value.trim(),
            gold: rewardGoldMap[drop.reward] || 0,
            createdAt,
          }))
        );
      }

      state.entries.unshift(entry);
      if (withDrops) state.records.unshift(...newRecords);
      saveState();

      els.date.value = getKoreanDateString();
      els.entryCount.value = "1";
      els.memo.value = "";
      state.drops = [makeDefaultDrop()];
      renderAll();
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeAttr(str) {
      return escapeHtml(str);
    }

    document.getElementById("add-drop-btn").addEventListener("click", () => {
      state.drops.push(makeDefaultDrop());
      renderDrops();
    });

    document.getElementById("save-with-drops").addEventListener("click", () => saveEntry(true));
    document.getElementById("save-entry-only").addEventListener("click", () => {
      state.drops = [];
      renderDrops();
      saveEntry(false);
    });

    loadState();
    els.date.value = getKoreanDateString();
    renderAll();
  </script>
</body>
</html>
